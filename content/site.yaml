site:
  title: BRACU DUBURI
  subtitle: VISION PIPELINE AUTOMATION
  tagline: Autonomous Underwater Vehicle · Object Detection System
  team_name: Team BRACU Duburi
  competition: RoboSub 2026

about:
  competition_name: RoboSub 2026
  competition_description: >
    RoboSub is an international student competition where teams from around the world
    design and build Autonomous Underwater Vehicles (AUVs). Vehicles navigate underwater
    tasks fully autonomously — no human control is allowed during the run. The competition
    is hosted by RoboNation and emphasizes real-world applications including underwater
    exploration, seafloor mapping, and sonar localization.
  venue: Woollett Aquatics Center, Irvine, California, USA
  date: July 11–16, 2026
  format: >
    Teams follow a three-stage structure — Design & Build, Underwater Tasks, and Scoring.
    Vehicles must navigate gates, identify buoys, drop markers into bins, fire torpedoes,
    and surface inside a final octagon structure, all without any human intervention.
  team_description: >
    BRACU Duburi is the AUV team from BRAC University, Dhaka, Bangladesh.
    Our vision system uses YOLO-based object detection trained on custom
    underwater datasets collected during pool trials and annotated through
    an automated n8n pipeline.

tasks:
  - id: gate
    name: Begin Assessment
    description: >
      Head out to assess the environment. The AUV navigates through a buoyant PVC gate
      with colored panels to select a mission role — Survey & Repair or Search & Rescue.
      Bonus points are awarded for stylistic maneuvers through the gate.
    run_name: Gate
    color: "#2563EB"

  - id: slalom
    name: Avoid Debris
    description: >
      Navigate a channel blocked with debris. The AUV passes through three sets of
      vertical red and white PVC pipes, earning more points for maintaining correct
      depth and staying aligned with the initial gate orientation.
    run_name: Slalom
    color: "#7C3AED"

  - id: bin
    name: Recon
    description: >
      Recon the area to determine what assistance to provide. The AUV drops markers
      into bins along a PVC pipeline and interacts with magnetic detectors to deactivate
      lights, scored on accuracy relative to the chosen mission role.
    run_name: Bin
    color: "#D97706"

  - id: torpedo
    name: Deploy
    description: >
      Provide necessary assistance. The AUV fires torpedoes through openings on a
      vertical board — maximum points for hitting larger openings first, then smaller
      ones at increasing distances.
    run_name: Torpedo
    color: "#059669"

  - id: octagon
    name: Restore
    description: >
      Restore vital infrastructure and health. The AUV surfaces within a nine-foot
      octagon, retrieves role-specific items from a table, places them in baskets,
      and orients toward corresponding directional markers while rotating.
    run_name: Octagon
    color: "#DC2626"

pipeline:
  description: >
    The annotation and training pipeline is fully automated using n8n workflow automation.
    Videos are split into parts, distributed to annotators via Gmail, and merged datasets
    are trained automatically on YOLO11n with underwater augmentation.
